name: Build Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: 실행 권한 부여
        run: chmod +x gradlew

      - name: 빌드
        run: ./gradlew build

      - name: jar 업로드
        uses: actions/upload-artifact@v4
        with:
          name: planetgachi-mod
          path: build/libs/planetgachi-mod-*.jar
          if-no-files-found: error
