name: Build & Release Mod

on:
  push:
    branches: [ main, dev ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-

      - name: 실행 권한 부여
        run: chmod +x gradlew

      - name: 빌드
        run: ./gradlew build

      - name: 빌드 결과 확인
        run: ls -lh build/libs/

      - name: JAR 업로드 (Actions Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: planetgachi-mod-${{ github.sha }}
          path: build/libs/planetgachi-mod-*.jar
          if-no-files-found: error
          retention-days: 30

      # 태그(v*) push 시 GitHub Release 자동 생성
      - name: GitHub Release 생성
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/planetgachi-mod-*.jar
          generate_release_notes: true
